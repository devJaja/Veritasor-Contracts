name: Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Coverage Gate (95 %)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # ── Per-crate gates ────────────────────────────────────────────
      # Enforcing individually prevents a high-coverage utility crate from
      # masking a low-coverage critical crate.
      # ────────────────────────────────────────────────────────────────

      - name: Gate — veritasor-attestation
        run: cargo llvm-cov --package veritasor-attestation --lib --fail-under-lines 95

      - name: Gate — veritasor-attestation-registry
        run: cargo llvm-cov --package veritasor-attestation-registry --lib --fail-under-lines 95

      - name: Gate — veritasor-attestor-staking
        run: cargo llvm-cov --package veritasor-attestor-staking --lib --fail-under-lines 95

      - name: Gate — veritasor-common
        run: cargo llvm-cov --package veritasor-common --lib --fail-under-lines 95

      - name: Gate — veritasor-audit-log
        run: cargo llvm-cov --package veritasor-audit-log --lib --fail-under-lines 95

      # ── Workspace report (informational) ───────────────────────────

      - name: Generate workspace HTML report
        run: cargo llvm-cov --workspace --html --output-dir coverage/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

